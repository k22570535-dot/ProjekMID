<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="container mx-auto px-6 py-10">

    <!-- Card Category -->
    <div class="bg-white rounded-xl shadow-lg max-w-md mx-auto overflow-hidden">
        <div class="bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600 p-4">
            <h2 class="text-white text-2xl font-bold">Product Categories</h2>
        </div>

        <div class="p-6">

            <ul class="space-y-2">
                <li th:each="cat : ${categories}"
                    class="flex justify-between items-center bg-gray-100 hover:bg-gray-200 transition-colors duration-300 rounded-lg px-4 py-2">

                    <a th:href="@{/products/category/{name}(name=${cat})}"
                       class="font-semibold text-blue-600 hover:text-blue-800 transition-colors duration-300"
                       th:text="${cat}">
                        Category Name
                    </a>

                    <span class="bg-purple-500 text-white text-xs font-semibold px-3 py-1 rounded-full"
                          th:text="${productCountByCategory[cat]}">
                        0
                    </span>

                </li>
            </ul>

            <div class="mt-6 text-center">
                <a th:href="@{/products}"
                   class="inline-block px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold shadow transition-colors duration-300">
                    Back to Product List
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
