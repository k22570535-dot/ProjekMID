<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statistik Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-10">

    <!-- Statistik Card -->
    <div class="bg-white rounded-xl shadow-lg max-w-3xl mx-auto overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-gray-800 via-gray-700 to-gray-900 p-4">
            <h2 class="text-white text-2xl font-bold">Statistik Inventori</h2>
        </div>

        <!-- Body -->
        <div class="p-6 space-y-6">

            <!-- Summary List -->
            <ul class="space-y-2">
                <li class="flex justify-between items-center bg-gray-100 px-4 py-2 rounded-lg">
                    <span>Total Produk:</span>
                    <b th:text="${stats.totalProducts}">0</b>
                </li>
                <li class="flex justify-between items-center bg-gray-100 px-4 py-2 rounded-lg">
                    <span>Rata-rata Harga:</span>
                    <b class="text-green-600 font-semibold"
                       th:text="'Rp ' + ${#numbers.formatDecimal(stats.avgPrice, 0, 'POINT', 0, 'POINT')}">0</b>
                </li>
                <li class="flex justify-between items-center bg-red-100 px-4 py-2 rounded-lg">
                    <span class="text-red-700 font-semibold">Stok Menipis (&lt; 20):</span>
                    <b th:text="${stats.lowStockCount}">0</b>
                </li>
            </ul>

            <!-- Harga Termahal / Termurah -->
            <div>
                <h4 class="text-lg font-semibold text-purple-700 mb-2">Perbandingan Harga</h4>
                <p>Termahal: <span th:text="${stats.expensive.name + ' (Rp ' + stats.expensive.price + ')'}"></span></p>
                <p>Termurah: <span th:text="${stats.cheapest.name + ' (Rp ' + stats.cheapest.price + ')'}"></span></p>
            </div>

            <!-- Summary Per Kategori -->
            <div>
                <h4 class="text-lg font-semibold text-purple-700 mb-2">Summary Per Kategori</h4>
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-gray-50 rounded-lg shadow-sm">
                        <tbody>
                        <tr th:each="entry : ${stats.categorySummary}" class="border-b last:border-b-0 hover:bg-purple-50 transition-colors">
                            <td class="px-4 py-2 font-medium text-gray-700" th:text="${entry.key}">Kategori</td>
                            <td class="px-4 py-2 font-semibold text-purple-700" th:text="${entry.value} + ' Produk'">0</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
