<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-6">

    <!-- Judul -->
    <h1 class="text-3xl font-bold text-purple-700 mb-6" th:text="${title}">Judul</h1>

    <!-- Search Form -->
    <form th:action="@{/products/search}" method="get" class="mb-6 flex gap-2">
        <input type="text" name="keyword"
               class="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500"
               placeholder="Cari produk..." th:value="${keyword}">
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 text-white font-semibold transition-colors duration-300">
            Cari
        </button>
    </form>

    <!-- Category Filter Badges -->
    <div class="mb-4 flex flex-wrap gap-2 items-center">
        <span class="font-medium text-gray-600">Filter:</span>
        <a th:href="@{/products}" class="px-3 py-1 rounded-full bg-gray-400 text-white text-sm hover:bg-gray-500 transition-colors">Semua</a>
        <a th:href="@{/products/category/Elektronik}" class="px-3 py-1 rounded-full bg-blue-500 text-white text-sm hover:bg-blue-600 transition-colors">Elektronik</a>
        <a th:href="@{/products/category/Buku}" class="px-3 py-1 rounded-full bg-green-500 text-white text-sm hover:bg-green-600 transition-colors">Buku</a>
        <a th:href="@{/products/category/Makanan}" class="px-3 py-1 rounded-full bg-yellow-400 text-gray-800 text-sm hover:bg-yellow-500 transition-colors">Makanan</a>
    </div>

    <p class="text-gray-500 mb-4">
        Menampilkan <strong th:text="${totalProducts}">0</strong> produk
    </p>

    <!-- Tabel / Daftar Produk -->
    <div th:if="${!products.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="product : ${products}"
             class="bg-white rounded-xl shadow-lg p-5 hover:shadow-2xl transition-shadow duration-300">
            <h2 class="text-xl font-semibold text-purple-700 mb-2" th:text="${product.name}">Nama Produk</h2>
            <p class="mb-1">
                Kategori:
                <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                   class="text-blue-600 hover:text-blue-800 font-medium transition-colors"
                   th:text="${product.category}">Kategori</a>
            </p>
            <p class="mb-1 text-green-600 font-semibold" th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                Rp 0
            </p>
            <p class="mb-2 flex items-center gap-2">
                Stok:
                <span th:text="${product.stock}"
                      th:classappend="${product.stock < 20 ? 'bg-red-500 text-white px-2 py-1 rounded-full text-xs font-semibold' : 'bg-green-500 text-white px-2 py-1 rounded-full text-xs font-semibold'}">
                        0
                    </span>
            </p>
            <a th:href="@{/products/{id}(id=${product.id})}"
               class="inline-block mt-2 px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-semibold transition-colors duration-300">
                Detail
            </a>
        </div>
    </div>

    <!-- Pesan kosong -->
    <div th:if="${products.isEmpty()}"
         class="bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-4 rounded-lg shadow mt-6">
        Tidak ada produk yang ditemukan.
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
