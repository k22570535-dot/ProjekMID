<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Detail Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-6">

    <!-- Produk ditemukan -->
    <div th:if="${product != null}">
        <!-- Breadcrumb -->
        <nav class="text-sm mb-4" aria-label="breadcrumb">
            <ol class="flex space-x-2 text-gray-500">
                <li>
                    <a th:href="@{/}" class="hover:text-purple-600 transition-colors">Home</a>
                    <span class="mx-1">/</span>
                </li>
                <li>
                    <a th:href="@{/products}" class="hover:text-purple-600 transition-colors">Produk</a>
                    <span class="mx-1">/</span>
                </li>
                <li class="text-gray-700 font-semibold" th:text="${product.name}">Nama</li>
            </ol>
        </nav>

        <!-- Judul Produk -->
        <h1 class="text-3xl font-bold text-purple-700 mb-6" th:text="${product.name}">Nama Produk</h1>

        <!-- Card Produk -->
        <div class="bg-white rounded-xl shadow-lg max-w-md p-6 mb-6 hover:shadow-2xl transition-shadow duration-300">
            <table class="w-full text-gray-700">
                <tr class="border-b">
                    <th class="py-2 text-left w-32">ID</th>
                    <td class="py-2" th:text="${product.id}">1</td>
                </tr>
                <tr class="border-b">
                    <th class="py-2 text-left">Nama</th>
                    <td class="py-2" th:text="${product.name}">Nama</td>
                </tr>
                <tr class="border-b">
                    <th class="py-2 text-left">Kategori</th>
                    <td class="py-2">
                        <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                           class="text-purple-600 hover:text-purple-800 font-medium transition-colors"
                           th:text="${product.category}">Kategori</a>
                    </td>
                </tr>
                <tr class="border-b">
                    <th class="py-2 text-left">Harga</th>
                    <td class="py-2 font-semibold text-green-600"
                        th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                        Rp 0
                    </td>
                </tr>
                <tr>
                    <th class="py-2 text-left">Stok</th>
                    <td class="py-2 flex items-center gap-2">
                        <span th:text="${product.stock}">0</span>
                        <span th:if="${product.stock < 20}"
                              class="px-2 py-1 rounded-full bg-red-500 text-white text-xs font-semibold">
                                Stok Menipis!
                            </span>
                        <span th:if="${product.stock >= 20}"
                              class="px-2 py-1 rounded-full bg-green-500 text-white text-xs font-semibold">
                                Tersedia
                            </span>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <!-- Produk tidak ditemukan -->
    <div th:if="${product == null}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-4 rounded-lg shadow mb-6">
        <h4 class="font-bold text-lg mb-2">Produk Tidak Ditemukan</h4>
        <p th:text="${error}" class="text-sm">Error message</p>
    </div>

    <!-- Tombol Kembali -->
    <div class="mt-4">
        <a th:href="@{/products}"
           class="inline-block bg-purple-600 hover:bg-purple-700 text-white font-semibold px-4 py-2 rounded-lg shadow transition-colors duration-300">
            Kembali ke Daftar
        </a>
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
