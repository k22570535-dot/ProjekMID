<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>About - Spring MVC Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-10">

    <!-- Judul -->
    <h1 class="text-3xl font-bold text-purple-700 mb-4" th:text="${appName}">App Name</h1>
    <hr class="border-purple-300 mb-6">

    <!-- Informasi Aplikasi -->
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-md mb-6">
        <p class="mb-2"><span class="font-semibold">Version:</span> <span th:text="${version}">1.0</span></p>
        <p class="mb-2"><span class="font-semibold">Author:</span> <span th:text="${author}">Nama</span></p>
    </div>

    <!-- Technologies Used -->
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-md mb-6">
        <h3 class="text-xl font-semibold text-purple-600 mb-3">Technologies Used:</h3>
        <ul class="space-y-2">
            <li th:each="tech : ${technologies}"
                class="px-3 py-2 bg-blue-100 text-blue-800 rounded-lg font-medium shadow hover:bg-blue-200 transition-colors duration-300"
                th:text="${tech}">Tech</li>
        </ul>
    </div>

    <!-- Tombol Kembali -->
    <div>
        <a th:href="@{/products}"
           class="inline-block px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 text-white font-semibold shadow transition-colors duration-300">
            Back to Products
        </a>
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
