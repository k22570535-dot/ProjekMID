<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-10">

    <!-- Hero / Welcome Card -->
    <div class="bg-gradient-to-r from-purple-500 via-pink-500 to-red-500 text-white rounded-xl shadow-lg p-8">
        <h1 class="text-4xl font-bold mb-4" th:text="${title}">Title</h1>
        <p class="text-lg mb-6" th:text="${description}">Description</p>
        <hr class="border-white mb-6">

        <h5 class="font-semibold mb-3">Jelajahi Produk:</h5>
        <div class="flex flex-wrap gap-3">
            <a th:href="@{/products}"
               class="px-4 py-2 bg-white text-purple-600 font-semibold rounded-lg shadow hover:bg-purple-100 transition-colors duration-300">
                Semua Produk
            </a>
            <a th:href="@{/products/category/Elektronik}"
               class="px-4 py-2 bg-purple-200 text-purple-800 font-semibold rounded-lg shadow hover:bg-purple-300 transition-colors duration-300">
                Elektronik
            </a>
            <a th:href="@{/products/category/Buku}"
               class="px-4 py-2 bg-green-200 text-green-800 font-semibold rounded-lg shadow hover:bg-green-300 transition-colors duration-300">
                Buku
            </a>
            <a th:href="@{/products/category/Makanan}"
               class="px-4 py-2 bg-yellow-200 text-yellow-800 font-semibold rounded-lg shadow hover:bg-yellow-300 transition-colors duration-300">
                Makanan
            </a>
        </div>
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
