<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="container mx-auto px-6 py-10 text-center">

    <!-- Greeting -->
    <h1 class="text-4xl font-bold text-purple-600 mb-6" th:text="${greeting}">Greeting</h1>

    <!-- Home Button -->
    <a th:href="@{/}"
       class="inline-block px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition-colors duration-300">
        Home
    </a>

</div>

</body>
</html>
